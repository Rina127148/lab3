<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лаб 3</title>
    <style>
        body {
            background: #b2d8c6;
            font-family: Arial, sans-serif;
            padding: 30px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
            color: #2c5e3f;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        button {
            background: #2c5e3f;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            font-size: 1rem;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Анкета</h1>
    <form action="process.php" method="POST">
        <label>1. ФИО</label>
        <input type="text" name="full_name" required>

        <label>2. Телефон</label>
        <input type="tel" name="phone" required>

        <label>3. Email</label>
        <input type="email" name="email" required>

        <label>4. Дата рождения</label>
        <input type="date" name="birth_date" required>

        <label>5. Пол</label>
        <div class="radio-group">
            <label><input type="radio" name="gender" value="male"> Мужской</label>
            <label><input type="radio" name="gender" value="female"> Женский</label>
        </div>

        <label>6. Любимые языки программирования</label>
        <select name="languages[]" multiple required>
            <option value="1">Pascal</option>
            <option value="2">C</option>
            <option value="3">C++</option>
            <option value="4">JavaScript</option>
            <option value="5">PHP</option>
            <option value="6">Python</option>
            <option value="7">Java</option>
            <option value="8">Haskell</option>
            <option value="9">Clojure</option>
            <option value="10">Prolog</option>
            <option value="11">Scala</option>
            <option value="12">Go</option>
        </select>

        <label>7. Биография</label>
        <textarea name="bio" rows="4"></textarea>

        <label>8. Я ознакомлен(а) с контрактом</label>
        <input type="checkbox" name="contract" value="1" required>

        <button type="submit">💾 Сохранить</button>
    </form>
</div>
</body>
</html>
